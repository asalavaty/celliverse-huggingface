name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 1

      - name: Show files being synced
        run: |
          echo "Current directory:"
          pwd

          echo "Top-level files:"
          ls -lah

          echo "Data files:"
          find data -maxdepth 3 -type f -print || true

          echo "Repository size:"
          du -sh .

      - name: Install Hugging Face Hub client
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade huggingface_hub

      - name: Upload folder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]

          api = HfApi(token=token)

          api.upload_folder(
              folder_path=".",
              repo_id="asalavaty/celliverse",
              repo_type="space",
              commit_message="Sync CelliVerse Space from GitHub",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".venv/*",
                  "venv/*",
                  "__pycache__/*",
                  ".DS_Store",
                  "*.pyc",
                  ".ipynb_checkpoints/*"
              ],
          )

          print("Upload to Hugging Face Space completed.")
          PY